name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  native-tests:
    name: Native Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run unit tests
        run: zig build test

      - name: Build library and examples
        run: zig build

  cross-target-compile:
    name: Cross-target Build/Test Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86-linux
            os: linux
            arch: x86
          - target: x86_64-linux
            os: linux
            arch: x86_64
          - target: aarch64-linux
            os: linux
            arch: aarch64
          - target: x86-windows
            os: windows
            arch: x86
          - target: x86_64-windows
            os: windows
            arch: x86_64
          - target: aarch64-windows
            os: windows
            arch: aarch64
          - target: x86_64-macos
            os: macos
            arch: x86_64
          - target: aarch64-macos
            os: macos
            arch: aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Compile library and examples
        run: zig build -Dtarget=${{ matrix.target }}

      - name: Compile unit tests (no execution)
        run: zig build test-compile -Dtarget=${{ matrix.target }}
